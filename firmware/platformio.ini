; N16R8 节气智居 · 初中组
; Hardware: LY-AS-ESP32-S3 v1.2 / N16R8
; This first batch compiles only; it does not upload to the board.

[platformio]
boards_dir = boards
default_envs = n16r8_esp32s3

[env:n16r8_esp32s3]
platform = espressif32
board = n16r8_esp32s3
framework = arduino
monitor_speed = 115200
upload_speed = 460800

build_flags =
  -DCORE_DEBUG_LEVEL=0
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_CDC_ON_BOOT=0

lib_deps =
  adafruit/DHT sensor library @ 1.4.6
  adafruit/Adafruit Unified Sensor @ ^1.1
  adafruit/Adafruit SSD1306 @ ^2.5
  adafruit/Adafruit GFX Library @ ^1.11
  madhephaestus/ESP32Servo @ ^1.2
  bblanchon/ArduinoJson @ ^7
  adafruit/Adafruit NeoPixel @ ^1.12
